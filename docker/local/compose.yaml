name: dtracker-local

services:
  db:
    image: postgres:18.3
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    # set shared memory limit when using docker compose
    shm_size: 128mb
    env_file:
      - ../../apps/api/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql

  cache:
    image: redis:8.6.2
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    env_file:
      - ../../apps/api/.env
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data

  mailhog:
    image: mailhog/mailhog
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
  redis-data:
  mailhog-data:
